<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Authentication</title>

        <link rel="stylesheet" href="../style/style.css" />

        <script type="module">
            import { saveToken, getUserId } from "../main.js";

            // Get the current user ID
            const user_id = getUserId();
            console.log(`Current user ID: ${user_id}`);

            // Modify a form to do something with an endpoint instead
            function attachAuthHandler(form_id, endpoint) {
                const form = document.getElementById(form_id);
                if (form === null) return;

                form.addEventListener("submit", async (event) => {
                    // Prevent the form from submitting as normal
                    event.preventDefault();

                    // Submit the data as normal, capturing the response
                    const data = new FormData(form);
                    const path = `https://coco.alloc.dev/api/${endpoint}`;
                    const response = await fetch(path, { method: "POST", body: data });

                    if (!response.ok) {
                        // handle response errors
                        alert("Authentication failed.");
                        return;
                    }

                    // Save the token in local storage for authentication
                    saveToken((await response.json()).token);
                    alert("Successfully logged in.");
                });
            }

            // Route sign_up and sign_in to respective endpoints
            attachAuthHandler("sign_up", "sign_up");
            attachAuthHandler("sign_in", "sign_in");
        </script>
    </head>

    <body>
        <h3>Sign-up form:</h3>
        <form id="sign_up" method="post">
            <input name="user_name" placeholder="User name" required />
            <br />
            <input type="password" name="password" placeholder="Password" required />
            <br />
            <input type="email" name="email" placeholder="Email" required />
            <br />
            <button type="submit">sign-up</button>
        </form>
        <br />

        <h3>Sign-in form:</h3>
        <form id="sign_in" method="post">
            <input name="user_name" placeholder="User name" required />
            <br />
            <input type="password" name="password" placeholder="Password" required />
            <br />
            <button type="submit">sign-in</button>
        </form>
        <br />
    </body>
</html>
