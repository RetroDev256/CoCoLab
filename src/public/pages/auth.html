<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Authentication</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
    </head>
    <body>
        <coco-header></coco-header>

        <main role="tablist" class="tabs tabs-lift self-center">
            <input
                type="radio"
                name="auth_tabs"
                class="tab"
                aria-label="Signin"
                checked
            />
            <div role="tabpanel" class="tab-content border-base-300 p-6">
                <form id="SigninForm" class="flex flex-col gap-4">
                    <input
                        name="username"
                        placeholder="User name"
                        class="input input-bordered"
                        required
                    />
                    <input
                        name="password"
                        type="password"
                        placeholder="Password"
                        class="input input-bordered"
                        required
                    />
                    <button type="submit" class="btn btn-primary">
                        Signin
                    </button>
                </form>
            </div>

            <input
                type="radio"
                name="auth_tabs"
                class="tab"
                aria-label="Signup"
            />
            <div role="tabpanel" class="tab-content border-base-300 p-6">
                <form id="SignupForm" class="flex flex-col gap-4">
                    <input
                        name="username"
                        placeholder="User name"
                        class="input input-bordered"
                        required
                    />
                    <input
                        name="email"
                        type="email"
                        placeholder="Email"
                        class="input input-bordered"
                        required
                    />
                    <input
                        name="password"
                        type="password"
                        placeholder="Password"
                        class="input input-bordered"
                        required
                    />
                    <button type="submit" class="btn btn-primary">
                        Signup
                    </button>
                </form>
            </div>
        </main>

        <coco-footer></coco-footer>
    </body>
    <script defer type="module">
        import { saveToken, getUser } from "../main.js";
        const user = getUser();
        console.log(user);
        document
            .getElementById("SignupForm")
            .addEventListener("submit", async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const response = await fetch(
                    "https://coco.alloc.dev/api/signup",
                    {
                        method: "POST",
                        body: formData,
                    }
                );
                if (response.ok) {
                    const json = await response.json();
                    saveToken(json.token);
                    window.location.href = "/";
                }
            });

        document
            .getElementById("SigninForm")
            .addEventListener("submit", async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const response = await fetch(
                    "https://coco.alloc.dev/api/signin",
                    {
                        method: "POST",
                        body: formData,
                    }
                );
                if (response.ok) {
                    const json = await response.json();
                    saveToken(json.token);
                    window.location.href = "/";
                }
            });
    </script>
</html>
