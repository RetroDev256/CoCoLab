<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Project Board</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
    </head>

    <body>
        <div id="coco_header"></div>

        <main
            class="grow md:rounded-box md:m-8 md:p-4 shadow-xl bg-repeat bg-size-[auto_500px]"
            style="background-image: url(../images/board.webp)"
        >
            <div class="flex justify-between w-full">
                <h1 class="text-4xl font-bold">Projects</h1>
                <button class="btn" onclick="new_project_modal.showModal()">
                    New Project
                </button>
                <dialog id="new_project_modal" class="modal">
                    <div class="modal-box flex flex-col gap-4">
                        <h3 class="font-bold text-lg">New Project</h3>
                        <form class="flex flex-col gap-4" id="new_project_form">
                            <input
                                name="project_name"
                                type="text"
                                placeholder="Project name"
                                class="input input-bordered w-full"
                                required
                            />

                            <textarea
                                name="details"
                                placeholder="Details"
                                class="textarea textarea-bordered min-h-24 w-full"
                                required
                            ></textarea>
                            <div
                                id="tag-list"
                                class="flex flex-wrap gap-4"
                            ></div>
                            <input
                                name="color"
                                type="color"
                                class="input"
                                id="new_project_color"
                            />
                            <button type="submit" class="btn btn-primary">
                                Create Project
                            </button>
                        </form>
                    </div>
                    <form method="dialog" class="modal-backdrop">
                        <button>close</button>
                    </form>
                </dialog>
            </div>

            <ul
                id="projects"
                class="m-2 md:m-4 grid justify-items-center gap-2 md:gap-8 grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 2xl:grid-cols-6"
            ></ul>
        </main>

        <div id="coco_footer"></div>
        <div id="toast-container" class="toast"></div>

        <script type="module" defer src="../scripts/projectBoard.js"></script>
    </body>
</html>
