<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Contact Us</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
    </head>

    <body>
        <coco-header></coco-header>

        <main>
            <h1>Contact Us</h1>
            <p>Have questions or feedback? We'd love to hear from you!</p>

            <!-- Contact Information -->
            <section id="contact-info">
                <h2>Get in Touch</h2>
                <ul>
                    <li>Email: contact@cocolab.com</li>
                    <li>Phone: (555) 123-4567</li>
                    <li>Address: 123 Collaboration St, Tech City, TC 12345</li>
                </ul>
            </section>

            <!-- Basic Contact Form -->
            <form id="contact-form">
                <label for="name">Name:</label><br />
                <input type="text" id="name" name="name" /><br /><br />

                <label for="email">Email:</label><br />
                <input type="email" id="email" name="email" /><br /><br />

                <label for="message">Message:</label><br />
                <textarea id="message" name="message"></textarea><br /><br />

                <!-- Submit Button -->
                <button type="submit">Send Message</button>
            </form>
            <!-- Submit Button -->
        </main>

        <coco-footer></coco-footer>

        <script>
            const menu = document.querySelector(".side-menu");

            function toggleMenu() {
                menu.classList.toggle("open");
            }

            document.addEventListener("click", (e) => {
                if (!menu.contains(e.target) && !e.target.closest("#burger")) {
                    menu.classList.remove("open");
                }
            });

            document.addEventListener("keydown", (e) => {
                if (e.key === "Escape") {
                    menu.classList.remove("open");
                }
            });
        </script>
    </body>
</html>
