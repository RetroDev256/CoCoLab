<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Forms</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
    </head>
    <body>
        <div id="coco_header"></div>
        <main
            class="container mx-auto p-8 grid grid-cols-1 md:grid-cols-2 gap-8"
        >
            <div class="card shadow-xl border border-base-300">
                <div class="card-body">
                    <h2 class="card-title mb-4">Create New Project</h2>
                    <form
                        action="/api/project"
                        method="POST"
                        class="flex flex-col gap-4"
                    >
                        <input
                            name="project_name"
                            type="text"
                            placeholder="Project name"
                            class="input input-bordered w-full"
                            required
                        />
                        <div class="flex gap-4">
                            <input
                                name="max_people"
                                type="number"
                                placeholder="Max people"
                                class="input input-bordered w-full"
                                required
                            />
                            <input
                                name="owner_id"
                                type="number"
                                placeholder="Owner ID"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>
                        <textarea
                            name="details"
                            placeholder="Details"
                            class="textarea textarea-bordered h-24"
                            required
                        ></textarea>
                        <button type="submit" class="btn btn-primary">
                            Create Project
                        </button>
                    </form>
                </div>
            </div>

            <div class="card shadow-xl border border-base-300">
                <div class="card-body">
                    <h2 class="card-title mb-4">Create Category Tag</h2>
                    <form
                        action="/api/category_tags"
                        method="POST"
                        class="join mb-8"
                    >
                        <input
                            name="name"
                            placeholder="Tag name"
                            class="input input-bordered join-item w-full"
                            required
                        />
                        <button type="submit" class="btn join-item">
                            Create
                        </button>
                    </form>
                    <h2 class="card-title mb-4">Attach Tag to Project</h2>
                    <form
                        action="/api/project"
                        method="POST"
                        class="flex flex-col gap-4"
                    >
                        <div class="flex gap-4">
                            <input
                                name="project_id"
                                type="number"
                                placeholder="Project ID"
                                class="input input-bordered w-full"
                                required
                            />
                            <br />
                            <input
                                name="tag_id"
                                type="number"
                                placeholder="Tag ID"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>
                        <button type="submit" class="btn btn-primary">
                            Attach Tag to Project
                        </button>
                    </form>
                </div>
            </div>

            <div class="card shadow-xl border border-base-300">
                <div class="card-body">
                    <form
                        action="/api/project"
                        method="POST"
                        class="flex flex-col gap-4"
                    >
                        <div class="flex gap-4">
                            <input
                                name="project_id"
                                type="number"
                                placeholder="Project ID"
                                class="input input-bordered w-full"
                                required
                            />
                            <br />
                            <input
                                name="user_id"
                                type="number"
                                placeholder="User ID"
                                class="input input-bordered w-full"
                                required
                            />
                        </div>
                        <input
                            name="role"
                            placeholder="Role"
                            class="input input-bordered w-full"
                            required
                        />
                        <button type="submit" class="btn btn-primary">
                            Add Project Member
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <div id="coco_footer"></div>
    </body>
</html>
