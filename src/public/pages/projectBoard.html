<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Project Board</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>

        <script type="module" defer>
            import { selectTable, getUserId, insert, toast } from "/main.js";

            const projects = await selectTable("project");
            const user_id = getUserId();

            let projects_html = "";
            for (const project of projects) {
                const is_owner =
                    user_id !== null && user_id == project.owner_id;
                // Do not include completed projects inside of the listing
                if (project.completed) continue;

                // Add a list eleement to the projects list for each project
                projects_html += `
                <li class="list-row">
                    <a href="project.html?id=${project.id}" class="flex items-center gap-4">
                        <div class="font-bold">${project.project_name}</div>
                        <div class="text-xs uppercase">${project.max_people} ${is_owner ? " - (Owner)" : ""}</div>
                        <div class="text-center">${project.details}</div>
                    </a>
                </li>
				`;
            }
            document.getElementById("projects").innerHTML = projects_html;

            const tag_list = await selectTable("category_tags");
            let tag_list_html = "";
            for (const tag of tag_list) {
                tag_list_html += `<input class="btn" type="checkbox" name="tags" value="${tag.id}" aria-label="${tag.name}"/>`;
            }
            document.getElementById("tag-list").innerHTML = tag_list_html;

            document
                .getElementById("new_project_form")
                .addEventListener("submit", async (event) => {
                    event.preventDefault();
                    if (!user_id) {
                        toast("Please log in to create a project.", "error");
                        return;
                    }
                    const data = new FormData(new_project_form);

                    try {
                        const project = await insert("project", {
                            project_name: data.get("project_name"),
                            details: data.get("details"),
                            max_people: data.get("max_people"),
                            owner_id: user_id,
                            completed: false,
                        });
                        console.log("Project", project);
                        for (const tag_id of data.getAll("tags")) {
                            const tag = await insert("projects_tags", {
                                project_id: project.id,
                                tag_id: tag_id,
                            });
                            console.log("Tag to project:", tag);
                        }
                        toast("Project created successfully!", "success");
                    } catch (error) {
                        console.error("Error creating project:", error);
                        toast(
                            "Error creating project. Please try again.",
                            "error"
                        );
                    }
                });
        </script>
    </head>

    <body>
        <div id="coco_header"></div>

        <main
            class="grow rounded-box m-4 md:m-8 p-4 shadow-xl bg-repeat bg-size-[auto_500px]"
            style="background-image: url(../images/board.webp)"
        >
            <div class="flex justify-between w-full">
                <h1 class="text-4xl font-bold">Projects</h1>
                <button class="btn" onclick="new_project_modal.showModal()">
                    New Project
                </button>
                <dialog id="new_project_modal" class="modal">
                    <div class="modal-box flex flex-col gap-4">
                        <h3 class="font-bold text-lg">New Project</h3>
                        <form class="flex flex-col gap-4" id="new_project_form">
                            <input
                                name="project_name"
                                type="text"
                                placeholder="Project name"
                                class="input input-bordered w-full"
                                required
                            />
                            <textarea
                                name="details"
                                placeholder="Details"
                                class="textarea textarea-bordered min-h-24 w-full"
                                required
                            ></textarea>
                            <div
                                class="flex flex-wrap gap-4"
                                id="tag-list"
                            ></div>
                            <label class="label">
                                <span class="label-text">Max people</span>
                                <input
                                    name="max_people"
                                    type="number"
                                    placeholder="Max people"
                                    class="input input-bordered w-full"
                                    value="5"
                                    required
                                />
                            </label>

                            <button type="submit" class="btn btn-primary">
                                Create Project
                            </button>
                        </form>
                    </div>
                    <form method="dialog" class="modal-backdrop">
                        <button>close</button>
                    </form>
                </dialog>
            </div>

            <ul id="projects" class="list"></ul>
        </main>

        <div id="coco_footer"></div>
        <div id="toast-container" class="toast"></div>
    </body>
</html>
