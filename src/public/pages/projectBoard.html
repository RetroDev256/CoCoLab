<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Project Board</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />

        <script type="module">
            import { selectByTable, getUser } from "/main.js";

            const project_list = await selectByTable("project");
            const listings = document.getElementById("listings");
            const user_id = getUser()?.id;

            let listing_html = "";
            for (const project of project_list) {
                let page = "project.html";
                if (user_id !== null && user_id == project.owner_id) {
                    page = "project-ownerView.html";
                }

                listing_html += `
                <li class="list-row">
                    <div class="text-xl">${project.project_name}</div>
                    <div>${project.details}</div>
                    <a
                        href="pages/${page}?id=${project.id}"
                        target="_blank"
                        class="btn btn-outline"
                    >
                        view<img
                            src="../images/icons/open-new-window.svg"
                            alt="view"
                            class="ml-2"
                        />
                    </a>
                </li>
				`;
            }

            listings.innerHTML = listing_html;
        </script>
    </head>

    <body>
        <header class="drawer sticky top-0 z-10">
            <input id="nav-drawer" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content flex flex-col">
                <div class="navbar bg-base-300 w-full">
                    <div class="navbar-start">
                        <label
                            for="nav-drawer"
                            aria-label="open sidebar"
                            class="btn btn-square btn-ghost"
                        >
                            <img src="../images/icons/menu.svg" alt="Menu" />
                        </label>
                    </div>
                    <a class="navbar-center gap-2 p-1" href="/">
                        <img
                            class="size-12"
                            src="../images/logo.png"
                            alt="CoCoLab Logo"
                        />
                        <h1 class="text-4xl tracking-tight font-bold">
                            CoCo<span class="text-primary">Lab</span>
                        </h1>
                    </a>
                    <div class="navbar-end">
                        <button class="btn btn-ghost btn-circle" id="account">
                            <img
                                class="account"
                                src="../images/icons/user.svg"
                                alt="User Account"
                            />
                        </button>
                        <script defer type="module">
                            import { getUser } from "./main.js";
                            document
                                .getElementById("account")
                                .addEventListener("click", async () => {
                                    const user = getUser();
                                    window.location.href = user
                                        ? "pages/userSettings.html"
                                        : "pages/auth.html";
                                });
                        </script>
                    </div>
                </div>
            </div>

            <div class="drawer-side">
                <label
                    for="nav-drawer"
                    aria-label="close sidebar"
                    class="drawer-overlay"
                ></label>
                <ul class="menu bg-base-200 min-h-full w-80 p-4">
                    <!-- Sidebar content here -->
                    <li>
                        <a href="pages/projectBoard.html">Project Board</a>
                    </li>
                    <li>
                        <a href="pages/projectManager.html">Project Manager</a>
                    </li>
                    <li>
                        <a href="pages/aboutDevs.html">About the Developers</a>
                    </li>
                    <li><a href="pages/contactUs.html">Contact Us</a></li>
                </ul>
            </div>
        </header>

        <main
            class="rounded-box m-4 md:m-8 p-4 shadow-xl bg-cover bg-center bg-no-repeat grow"
            style="background-image: url(../images/board.jpg)"
        >
            <h1 class="w-full text-center text-4xl font-bold">Projects:</h1>
            <ul id="listings" class="list"></ul>
        </main>

        <footer class="footer footer-center p-4 bg-base-300 mt-auto">
            <aside class="grid-flow-col items-center">
                <img
                    class="size-10"
                    src="../images/logo.png"
                    alt="CoCoLab Logo"
                />
                <p class="px-2">
                    &copy; <span id="year">2026</span> CoCoLab. All rights
                    reserved.
                </p>
                <script>
                    document.getElementById("year").textContent =
                        new Date().getFullYear();
                </script>
            </aside>
            <nav class="grid-flow-col gap-4">
                <a>
                    <img
                        class="size-5"
                        src="../images/icons/social_media/facebook.svg"
                        alt="facebook"
                    />
                </a>
                <a>
                    <img
                        class="size-5"
                        src="../images/icons/social_media/instagram.svg"
                        alt="instagram"
                    />
                </a>
                <a>
                    <img
                        class="size-5"
                        src="../images/icons/social_media/youtube.svg"
                        alt="youtube"
                    />
                </a>
            </nav>
        </footer>
    </body>
</html>
