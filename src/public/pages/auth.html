<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Authentication</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>

        <script type="module">
            import { saveToken, getUserId, toast } from "../main.js";

            // Get the current user ID
            const user_id = getUserId();
            console.log(`Current user ID: ${user_id}`);

            // Modify a form to do something with an endpoint instead
            function attachAuthHandler(form_id, endpoint) {
                const form = document.getElementById(form_id);
                if (form === null) return;

                form.addEventListener("submit", async (event) => {
                    // Prevent the form from submitting as normal
                    event.preventDefault();

                    // Submit the data as normal, capturing the response
                    const data = new FormData(form);
                    const path = `https://coco.alloc.dev/api/${endpoint}`;
                    const response = await fetch(path, {
                        method: "POST",
                        body: data,
                    });

                    if (!response.ok) {
                        // handle response errors
                        console.log("Authentication failure.");
                        toast("Authentication failure.", "error");
                        return;
                    }

                    // Save the token in local storage for authentication
                    saveToken(await response.json());
                    console.log("Successfully logged in.");
                    window.location.href = "/";
                });
            }

            // Route sign_up and sign_in to respective endpoints
            attachAuthHandler("sign_up", "sign_up");
            attachAuthHandler("sign_in", "sign_in");
        </script>
    </head>

    <body class="bg-base-200">
        <div id="coco_header"></div>

        <main role="tablist" class="tabs tabs-lift self-center">
            <input
                type="radio"
                name="auth_tabs"
                class="tab"
                aria-label="Sign in"
                checked
            />
            <div
                role="tabpanel"
                class="tab-content border-base-300 p-6 bg-base-100"
            >
                <form id="sign_in" method="post" class="flex flex-col gap-4">
                    <div class="flex flex-col gap-4 justify-center h-40">
                        <input
                            name="user_name"
                            placeholder="User name"
                            class="input input-bordered"
                            required
                        />
                        <input
                            name="password"
                            type="password"
                            placeholder="Password"
                            class="input input-bordered"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Sign in
                    </button>
                </form>
            </div>

            <input
                type="radio"
                name="auth_tabs"
                class="tab"
                aria-label="Sign up"
            />
            <div
                role="tabpanel"
                class="tab-content border-base-300 p-6 bg-base-100"
            >
                <form id="sign_up" method="post" class="flex flex-col gap-4">
                    <div class="flex flex-col gap-4 justify-center h-40">
                        <input
                            name="user_name"
                            placeholder="User name"
                            class="input input-bordered"
                            required
                        />
                        <input
                            name="email"
                            type="email"
                            placeholder="Email"
                            class="input input-bordered"
                            required
                        />
                        <input
                            name="password"
                            type="password"
                            placeholder="Password"
                            class="input input-bordered"
                            required
                        />
                    </div>
                    <button type="submit" class="btn btn-primary">
                        Sign up
                    </button>
                </form>
            </div>
        </main>

        <div id="coco_footer"></div>
        <div id="toast-container" class="toast"></div>
    </body>
</html>
