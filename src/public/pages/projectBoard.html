<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Project Board</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
        <script type="module" src="../scripts/project.js"></script>

        <script type="module">
            import { selectTable, getUserId } from "/main.js";

            const project_list = await selectTable("project");
            const listings = document.getElementById("listings");
            const user_id = getUserId();

            let listing_html = "";
            for (const project of project_list) {
                const is_owner =
                    user_id !== null && user_id == project.owner_id;
                // Do not include completed projects inside of the listing
                if (project.completed) continue;

                // Add a list eleement to the projects list for each project
                listing_html += `
                <li class="list-row">
                    <a href="project.html?id=${project.id}" class="flex items-center gap-4">
                        <div class="font-bold">${project.project_name}</div>
                        <div class="text-xs uppercase">${project.max_people} ${is_owner ? " - (Owner)" : ""}</div>
                        <div class="text-center">${project.details}</div>
                    </a>
                </li>
				`;
            }

            listings.innerHTML = listing_html;
        </script>
    </head>

    <body>
        <div id="coco_header"></div>

        <main
            class="grow rounded-box m-4 md:m-8 p-4 shadow-xl bg-repeat bg-size-[auto_500px]"
            style="background-image: url(../images/board.webp)"
        >
            <div class="flex justify-between w-full">
                <h1 class="text-4xl font-bold">Projects</h1>
                <button class="btn" onclick="new_project_modal.showModal()">
                    New Project
                </button>
                <dialog id="new_project_modal" class="modal">
                    <div class="modal-box">
                        <h3 class="font-bold text-lg">New Project</h3>
                        <p>Fill out the form below to create a new project.</p>
                        <!-- Insert form here -->
                        <form
                        action="/api/project"
                        method="POST"
                        class="flex flex-col gap-4"
                    >
                        <input
                            name="project_name"
                            id="project_name_input"
                            type="text"
                            placeholder="Project name"
                            class="input input-bordered w-full"
                            required
                        />
                        <div class="flex gap-4">
                            <input
                                name="max_people"
                                type="number"
                                id="max_people_input"
                                placeholder="Max people"
                                class="input input-bordered w-full"
                                required
                            />
                            <input
                                style="display: none;"
                                name="owner_id"
                                type="number"
                                placeholder="Owner ID"
                                class="input input-bordered w-full"
                                
                            />
                        </div>
                        <textarea
                            name="details"
                            id="details_input"
                            placeholder="Details"
                            class="textarea textarea-bordered h-24"
                            required
                        ></textarea>
                        <button type="submit" id="create-project-button" class="btn btn-primary">
                            Create Project
                        </button>
                    </form>
                    </div>
                    <form method="dialog" class="modal-backdrop">
                        <button>close</button>
                    </form>
                </dialog>
            </div>

            <ul id="listings" class="list"></ul>
        </main>

        <div id="coco_footer"></div>
    </body>
</html>
