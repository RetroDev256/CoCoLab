<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Contact Us</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>
        <script defer>
            document.addEventListener("DOMContentLoaded", () => {
                const form = document.getElementById("contactForm");
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    window.location.href = "https://youtu.be/dQw4w9WgXcQ";
                });
            });
        </script>
    </head>

    <body>
        <div id="coco_header"></div>

        <main class="hero grow bg-base-200">
            <div class="hero-content flex-col lg:flex-row gap-12">
                <div class="text-center lg:text-left max-w-md">
                    <h1 class="text-5xl font-bold">Contact Us</h1>
                    <p class="py-6">
                        Have questions or feedback? We'd love to hear from you!
                        Our team is ready to help you collaborate.
                    </p>
                    <ul class="space-y-2 opacity-80">
                        <li>
                            <span class="font-bold">Email:</span>
                            contact@cocolab.com
                        </li>
                        <li>
                            <span class="font-bold">Phone:</span> (555) 123-4567
                        </li>
                    </ul>
                </div>
                <div
                    class="card shrink-0 w-full max-w-sm shadow-2xl bg-base-100"
                >
                    <form class="card-body p-6" id="contactForm">
                        <div class="form-control">
                            <label class="label"
                                ><span class="label-text">Name</span></label
                            >
                            <input
                                type="text"
                                name="name"
                                class="input input-bordered"
                                required
                            />
                        </div>
                        <div class="form-control">
                            <label class="label"
                                ><span class="label-text">Email</span></label
                            >
                            <input
                                type="email"
                                name="email"
                                class="input input-bordered"
                                required
                            />
                        </div>
                        <div class="form-control">
                            <label class="label"
                                ><span class="label-text">Message</span></label
                            >
                            <textarea
                                name="message"
                                class="textarea textarea-bordered h-24"
                                required
                            ></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary mt-6">
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </main>

        <div id="coco_footer"></div>
    </body>
</html>
