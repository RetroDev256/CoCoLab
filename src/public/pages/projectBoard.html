<!doctype html>

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>CoCoLab - Project Board</title>

        <link rel="stylesheet" href="../output.css" />
        <link rel="icon" type="image/webp" href="../images/brownie.webp" />
        <script type="module" src="../main.js"></script>

        <script type="module">
            import { selectByTable, getUser } from "/main.js";

            const project_list = await selectByTable("project");
            const listings = document.getElementById("listings");
            const user_id = getUser()?.id;

            let listing_html = "";
            for (const project of project_list) {
                const is_owner =
                    user_id !== null && user_id == project.owner_id;

                listing_html += `
                <li class="list-row">
                    <div class="font-bold">
                        <div>${project.project_name}</div>
                        <div class="text-xs uppercase">${project.owner_id} - ${project.max_people} ${is_owner ? " - (Owner)" : ""}</div>
                    </div>
                    <div class="text-center">${project.details}</div>
                    <a
                        href="pages/${is_owner ? "project-ownerView.html" : "project.html"}?id=${project.id}"
                        target="_blank"
                        class="btn btn-square btn-ghost"
                    >
                        <img
                            src="../images/icons/open-new-window.svg"
                            alt="view"
                        />
                    </a>
                </li>
				`;
            }

            listings.innerHTML = listing_html;
        </script>
    </head>

    <body>
        <coco-header></coco-header>

        <main
            class="grow rounded-box m-4 md:m-8 p-4 shadow-xl bg-repeat bg-size-[auto_500px]"
            style="background-image: url(../images/board.jpg)"
        >
            <h1 class="w-full text-center text-4xl font-bold">Projects:</h1>
            <ul id="listings" class="list"></ul>
        </main>

        <coco-footer></coco-footer>
    </body>
</html>
